config system interface
    edit "VLAN10_DATA"
        set vdom "root"
        set ip 10.50.0.1 255.255.255.224
        set allowaccess ping https ssh
        set alias "DATA - Base_Exemple"
        set role lan
        set interface "internal"
        set vlanid 10
    next
    edit "VLAN20_VOIX"
        set vdom "root"
        set ip 10.50.1.1 255.255.255.240
        set allowaccess ping https ssh
        set alias "VOIX - Base_Exemple"
        set role lan
        set interface "internal"
        set vlanid 20
    next
    edit "VLAN30_GUEST"
        set vdom "root"
        set ip 10.50.2.1 255.255.255.224
        set allowaccess ping https ssh
        set alias "GUEST - Base_Exemple"
        set role dmz
        set interface "internal"
        set vlanid 30
    next
    edit "VLAN40_IOT"
        set vdom "root"
        set ip 10.50.3.1 255.255.255.240
        set allowaccess ping https ssh
        set alias "IOT - Base_Exemple"
        set role dmz
        set interface "internal"
        set vlanid 40
    next
end

config system zone
    edit "trust"
        set interface "VLAN10_DATA" "VLAN20_VOIX" 
    next
    edit "guest"
        set interface "VLAN30_GUEST" 
    next
    edit "restricted"
        set interface "VLAN40_IOT" 
    next
end

config system dhcp server
    edit 1
        set interface "VLAN10_DATA"
        set default-gateway 10.50.0.1
        set netmask 255.255.255.224
        config ip-range
            edit 1
                set start-ip 10.50.0.2
                set end-ip 10.50.0.30
            next
        end
        set dns-service default
    next
    edit 2
        set interface "VLAN20_VOIX"
        set default-gateway 10.50.1.1
        set netmask 255.255.255.240
        config ip-range
            edit 1
                set start-ip 10.50.1.2
                set end-ip 10.50.1.14
            next
        end
        set dns-service default
    next
    edit 3
        set interface "VLAN30_GUEST"
        set default-gateway 10.50.2.1
        set netmask 255.255.255.224
        config ip-range
            edit 1
                set start-ip 10.50.2.2
                set end-ip 10.50.2.30
            next
        end
        set dns-service default
    next
    edit 4
        set interface "VLAN40_IOT"
        set default-gateway 10.50.3.1
        set netmask 255.255.255.240
        config ip-range
            edit 1
                set start-ip 10.50.3.2
                set end-ip 10.50.3.14
            next
        end
        set dns-service default
    next
end

! ------------------------------------------------------------
! SD-WAN / failover - liaison principale : starlink
!                     liaison secours   : 4g
! ------------------------------------------------------------
config system sdwan
    set status enable
    config zone
        edit "virtual-wan-link"
        next
    end
    config members
        edit 1
            set interface "wan1"
            set comment "Liaison principale - starlink"
        next
        edit 2
            set interface "wan2"
            set comment "Liaison secours - 4g"
        next
    end
    config health-check
        edit "internet-check"
            set server "8.8.8.8" "1.1.1.1"
            set interval 5
            set failtime 3
            set recoverytime 5
        next
    end
end
