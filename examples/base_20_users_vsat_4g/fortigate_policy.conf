config firewall address
    edit "NET_DATA"
        set subnet 10.50.0.0 255.255.255.224
    next
    edit "NET_VOIX"
        set subnet 10.50.1.0 255.255.255.240
    next
    edit "NET_GUEST"
        set subnet 10.50.2.0 255.255.255.224
    next
    edit "NET_IOT"
        set subnet 10.50.3.0 255.255.255.240
    next
end

config firewall policy

    edit 1
        set name "OUT_DATA_TO_INTERNET"
        set srcintf "VLAN10_DATA"
        set dstintf "wan1" "wan2"
        set srcaddr "NET_DATA"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "DNS" "HTTPS" "HTTP"
        set nat enable
        set utm-status enable
        set ssl-ssh-profile "certificate-inspection"
        set av-profile "default"
        set webfilter-profile "default"
        set ips-sensor "default"
        set logtraffic all
    next
